<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả báo cáo - Trung tâm dữ liệu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 36px;
            box-shadow: 0 30px 60px rgba(0, 20, 40, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: fit-content;
            max-width: 1200px;
            min-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b2b3b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #1d4a5f;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 60px;
            letter-spacing: 0.3px;
        }

        .subhead {
            color: #3b5e71;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 36px;
            border-left: 4px solid #1d4a5f;
            padding-left: 18px;
            background: rgba(29, 74, 95, 0.05);
            border-radius: 0 20px 20px 0;
            width: fit-content;
            padding: 12px 24px 12px 20px;
        }

        .grid-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .card-btn {
            flex: 1 1 210px;
            min-width: 210px;
            background: white;
            border: none;
            border-radius: 32px;
            padding: 28px 16px 24px;
            box-shadow: 0 12px 28px -8px rgba(0, 40, 60, 0.2), 0 4px 12px rgba(0, 0, 0, 0.02);
            transition: all 0.25s ease;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .card-btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 40px -12px #1d4a5f80, 0 0 0 2px rgba(29, 74, 95, 0.3);
            background: #ffffff;
        }

        .card-btn:active {
            transform: translateY(-2px);
        }

        .icon {
            font-size: 3.6rem;
            line-height: 1;
            filter: drop-shadow(2px 6px 8px rgba(0, 60, 80, 0.2));
            transition: transform 0.2s;
        }

        .card-btn:hover .icon {
            transform: scale(1.02);
        }

        .label {
            font-size: 1.5rem;
            font-weight: 600;
            color: #124257;
            letter-spacing: -0.3px;
        }

        .link-hint {
            font-size: 0.75rem;
            color: #6b8a9c;
            max-width: 180px;
            word-break: break-all;
            background: #eef5f9;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 500;
        }

        .demo-hint {
            background: #f4f0eb;
            color: #86644c;
        }

      

     
       

      

        hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #9fb8c7, transparent);
            margin: 30px 0 10px;
        }

        @media (max-width: 760px) {
            .dashboard {
                padding: 28px 20px;
            }
            .label {
                font-size: 1.3rem;
            }
            .icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <h1>
            📋 Tất cả báo cáo
        </h1>
      

        <div class="grid-buttons">
            <!-- 1. Kinh doanh - Icon biểu đồ tăng trưởng + bảng điều khiển -->
            <a href="https://tuan45734.github.io/bao-cao-kinh-doanh/" target="_blank" rel="noopener noreferrer" class="card-btn">
                <div class="icon">📊💼</div>
                <div class="label">Kinh doanh</div>
                <div class="link-hint" title="https://tuan45734.github.io/bao-cao-kinh-doanh/">Báo cáo KPI & doanh thu</div>
            </a>
            
            <!-- 2. Sell out - Icon máy tính tiền + biểu đồ bán lẻ -->
            <a href="https://tuan45734.github.io/bao-cao-sell-out/" target="_blank" rel="noopener noreferrer" class="card-btn">
                <div class="icon">🛒📈</div>
                <div class="label">Sell out</div>
                <div class="link-hint" title="https://tuan45734.github.io/bao-cao-sell-out/">Báo cáo KPI sell-out</div>
            </a>

            <!-- 3. Sell in - Icon nhập kho, vận chuyển -->
            <a href="https://tuan45734.github.io/bao-cao-sell-in/" target="_blank" rel="noopener noreferrer" class="card-btn">
                <div class="icon">📦🚛</div>
                <div class="label">Sell in</div>
                <div class="link-hint" title="https://tuan45734.github.io/bao-cao-sell-in/">Báo cáo Sell in</div>
            </a>
            
            <!-- 4. Tồn Kho - Icon kho hàng, thẻ kho -->
            <a href="https://tuan45734.github.io/bao-cao-ton-kho/" target="_blank" rel="noopener noreferrer" class="card-btn">
                <div class="icon">🏬📦</div>
                <div class="label">Tồn Kho</div>
                <div class="link-hint" title="https://tuan45734.github.io/bao-cao-ton-kho/">Báo cáo Tồn Kho</div>
            </a>
            
            <!-- 5. Sản phẩm - Icon danh mục, nhãn hàng -->
            <a href="https://tuan45734.github.io/bao-cao-san-pham/" target="_blank" rel="noopener noreferrer" class="card-btn">
                <div class="icon">🏷️📑</div>
                <div class="label">Sản phẩm</div>
                <div class="link-hint" title="https://tuan45734.github.io/bao-cao-san-pham/">Báo cáo Sản phẩm</div>
            </a>
            
            <!-- 6. Công cụ dụng cụ - Icon bộ dụng cụ, bảo hộ lao động -->
            <a href="" target="_blank" rel="noopener noreferrer" class="card-btn">
                <div class="icon">🔧🧰</div>
                <div class="label">Công cụ dụng cụ</div>
                <div class="link-hint" title="">Báo cáo CCDC</div>
            </a>
        </div>

       
    </div>
</body>

</html>
